display_name: Memcached Receiver
type: memcached
reaggregation_enabled: true

description: |
  This receiver can fetch stats from a Memcached instance using the [stats
  command](https://github.com/memcached/memcached/wiki/Commands#statistics). A
  detailed description of all the stats available is at
  https://github.com/memcached/memcached/blob/master/doc/protocol.txt#L1159.

status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: [contrib]
  codeowners:
    active: [jsirianni]
    emeritus: [djaglowski]
    seeking_new: true

attributes:
  command:
    description: The type of command.
    requirement_level: recommended
    type: string
    enum:
      - get
      - set
      - flush
      - touch
  direction:
    description: Direction of data flow.
    requirement_level: recommended
    type: string
    enum:
      - sent
      - received
  operation:
    description: The type of operation.
    requirement_level: recommended
    type: string
    enum:
      - increment
      - decrement
      - get
  slab:
    description: The slab class id (chunk-size class) the metric pertains to.
    requirement_level: recommended
    type: int
  slab_chunk_state:
    description: The allocation state of chunks within a slab class.
    requirement_level: recommended
    type: string
    enum:
      - used
      - free
      - total
  slab_operation:
    description: The type of operation serviced by a slab class.
    requirement_level: recommended
    type: string
    enum:
      - set
      - get
      - delete
      - increment
      - decrement
      - touch
      - cas
  state:
    description: The type of CPU usage.
    requirement_level: recommended
    type: string
    enum:
      - system
      - user

  type:
    description: Result of cache request.
    requirement_level: recommended
    type: string
    enum:
      - hit
      - miss
metrics:
  memcached.bytes:
    enabled: true
    description: Current number of bytes used by this server to store items.
    stability: development
    unit: By
    gauge:
      value_type: int
    attributes: []
  memcached.commands:
    enabled: true
    description: Commands executed.
    stability: development
    unit: "{commands}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [command]
  memcached.connections.current:
    enabled: true
    description: The current number of open connections.
    stability: development
    unit: "{connections}"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: []
  memcached.connections.total:
    enabled: true
    description: Total number of connections opened since the server started running.
    stability: development
    unit: "{connections}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: []
  memcached.cpu.usage:
    enabled: true
    description: Accumulated user and system time.
    stability: development
    unit: s
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [state]
  memcached.current_items:
    enabled: true
    description: Number of items currently stored in the cache.
    stability: development
    unit: "{items}"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: []
  memcached.evictions:
    enabled: true
    description: Cache item evictions.
    stability: development
    unit: "{evictions}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: []
  memcached.network:
    enabled: true
    description: Bytes transferred over the network.
    stability: development
    unit: by
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [direction]
  memcached.operation_hit_ratio:
    enabled: true
    description: Hit ratio for operations, expressed as a percentage value between 0.0 and 100.0.
    stability: development
    unit: '%'
    gauge:
      value_type: double
    attributes: [operation]
  memcached.operations:
    enabled: true
    description: Operation counts.
    stability: development
    unit: "{operations}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [type, operation]
  memcached.slabs.allocated_memory:
    enabled: false
    description: Total memory allocated to slab pages.
    stability: development
    unit: By
    gauge:
      value_type: int
    attributes: []
  memcached.slabs.chunk_size:
    enabled: false
    description: The amount of space each chunk uses in a slab class.
    stability: development
    unit: By
    gauge:
      value_type: int
    attributes: [slab]
  memcached.slabs.chunks:
    enabled: false
    description: Number of chunks in a slab class, by allocation state.
    stability: development
    unit: "{chunk}"
    gauge:
      value_type: int
    attributes: [slab, slab_chunk_state]
  memcached.slabs.chunks_per_page:
    enabled: false
    description: Number of chunks within a single page in a slab class.
    stability: development
    unit: "{chunk}"
    gauge:
      value_type: int
    attributes: [slab]
  memcached.slabs.count:
    enabled: false
    description: Total number of slab classes allocated.
    stability: development
    unit: "{slab}"
    gauge:
      value_type: int
    attributes: []
  memcached.slabs.operations:
    enabled: false
    description: Number of operations serviced by a slab class.
    stability: development
    unit: "{operation}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [slab, slab_operation]
  memcached.slabs.pages:
    enabled: false
    description: Total number of pages allocated to a slab class.
    stability: development
    unit: "{page}"
    gauge:
      value_type: int
    attributes: [slab]
  memcached.slabs.requested_memory:
    enabled: false
    description: Number of bytes requested to be stored in a slab class.
    stability: development
    unit: By
    gauge:
      value_type: int
    attributes: [slab]
  memcached.threads:
    enabled: true
    description: Number of threads used by the memcached instance.
    stability: development
    unit: "{threads}"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: []
