version: 1
signal: metrics
resources:
    - scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/memcachedreceiver
          version: latest
          metrics:
            - name: memcached.bytes
              type: gauge
              unit: By
            - name: memcached.commands
              type: sum
              unit: '{commands}'
              temporality: cumulative
              monotonic: true
              datapoints:
                - attributes:
                    command: flush
                - attributes:
                    command: get
                - attributes:
                    command: set
                - attributes:
                    command: touch
            - name: memcached.connections.current
              type: sum
              unit: '{connections}'
              temporality: cumulative
              monotonic: false
            - name: memcached.connections.total
              type: sum
              unit: '{connections}'
              temporality: cumulative
              monotonic: true
            - name: memcached.cpu.usage
              type: sum
              unit: s
              temporality: cumulative
              monotonic: true
              datapoints:
                - attributes:
                    state: system
                - attributes:
                    state: user
            - name: memcached.current_items
              type: sum
              unit: '{items}'
              temporality: cumulative
              monotonic: false
            - name: memcached.evictions
              type: sum
              unit: '{evictions}'
              temporality: cumulative
              monotonic: true
            - name: memcached.network
              type: sum
              unit: by
              temporality: cumulative
              monotonic: true
              datapoints:
                - attributes:
                    direction: received
                - attributes:
                    direction: sent
            - name: memcached.operation_hit_ratio
              type: gauge
              unit: '%'
              datapoints:
                - attributes:
                    operation: decrement
                - attributes:
                    operation: get
                - attributes:
                    operation: increment
            - name: memcached.operations
              type: sum
              unit: '{operations}'
              temporality: cumulative
              monotonic: true
              datapoints:
                - attributes:
                    operation: decrement
                    type: hit
                - attributes:
                    operation: decrement
                    type: miss
                - attributes:
                    operation: get
                    type: hit
                - attributes:
                    operation: get
                    type: miss
                - attributes:
                    operation: increment
                    type: hit
                - attributes:
                    operation: increment
                    type: miss
            - name: memcached.slabs.allocated_memory
              type: gauge
              unit: By
            - name: memcached.slabs.chunk_size
              type: gauge
              unit: By
              datapoints:
                - attributes:
                    slab: 1
                - attributes:
                    slab: 2
            - name: memcached.slabs.chunks
              type: gauge
              unit: '{chunk}'
              datapoints:
                - attributes:
                    slab: 1
                    slab_chunk_state: free
                - attributes:
                    slab: 1
                    slab_chunk_state: total
                - attributes:
                    slab: 1
                    slab_chunk_state: used
                - attributes:
                    slab: 2
                    slab_chunk_state: free
                - attributes:
                    slab: 2
                    slab_chunk_state: total
                - attributes:
                    slab: 2
                    slab_chunk_state: used
            - name: memcached.slabs.chunks_per_page
              type: gauge
              unit: '{chunk}'
              datapoints:
                - attributes:
                    slab: 1
                - attributes:
                    slab: 2
            - name: memcached.slabs.count
              type: gauge
              unit: '{slab}'
            - name: memcached.slabs.operations
              type: sum
              unit: '{operation}'
              temporality: cumulative
              monotonic: true
              datapoints:
                - attributes:
                    slab: 1
                    slab_operation: cas
                - attributes:
                    slab: 1
                    slab_operation: decrement
                - attributes:
                    slab: 1
                    slab_operation: delete
                - attributes:
                    slab: 1
                    slab_operation: get
                - attributes:
                    slab: 1
                    slab_operation: increment
                - attributes:
                    slab: 1
                    slab_operation: set
                - attributes:
                    slab: 1
                    slab_operation: touch
                - attributes:
                    slab: 2
                    slab_operation: cas
                - attributes:
                    slab: 2
                    slab_operation: decrement
                - attributes:
                    slab: 2
                    slab_operation: delete
                - attributes:
                    slab: 2
                    slab_operation: get
                - attributes:
                    slab: 2
                    slab_operation: increment
                - attributes:
                    slab: 2
                    slab_operation: set
                - attributes:
                    slab: 2
                    slab_operation: touch
            - name: memcached.slabs.pages
              type: gauge
              unit: '{page}'
              datapoints:
                - attributes:
                    slab: 1
                - attributes:
                    slab: 2
            - name: memcached.slabs.requested_memory
              type: gauge
              unit: By
              datapoints:
                - attributes:
                    slab: 1
                - attributes:
                    slab: 2
            - name: memcached.threads
              type: sum
              unit: '{threads}'
              temporality: cumulative
              monotonic: false
